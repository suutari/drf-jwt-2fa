[tox]
basepython = python3.14
envlist =
    lint
    style
    typing
    uvlock
    docrendering
    py312-django32
    py{312,314,315}-django{42,52}
    py{312,314,315}-django60
    py315-djangoLATEST
labels =
    check = lint, style, typing, uvlock, docrendering, deploycheck

[testenv]
labels =
    py3{12,14,15}: test
package = wheel
no_default_groups = true
dependency_groups = dev
constrain_package_deps = True
deps =
    django32: django~=3.2.0
    django42: django~=4.2.0
    django52: django~=5.2.0
    django60: django~=6.0.0
setenv =
    PYTHONPATH=.
commands =
    pytest {posargs:--cov=drf_jwt_2fa}

[testenv:py315-djangoLATEST]
constrain_package_deps = False
setenv =
    PYTHONPATH=.
    UV_PRERELEASE=allow
deps = django@https://github.com/django/django/archive/refs/heads/main.zip

[testenv:lint]
runner = uv-venv-lock-runner
package = skip
commands =
    ruff check {posargs}

[testenv:style]
runner = uv-venv-lock-runner
package = skip
commands =
    ruff format --check --diff {posargs}

[testenv:typing]
runner = uv-venv-lock-runner
package = editable
commands =
    mypy {posargs:.}

[testenv:uvlock]
package = skip
dependency_groups =
commands = uv lock --check

[testenv:docrendering]
package = skip
dependency_groups =
deps = readme_renderer[md]
allowlist_externals = ./render-text-docs
commands =
    ./render-text-docs {posargs:--check README.rst ChangeLog.rst}

[testenv:deploycheck]
runner = uv-venv-lock-runner
package = wheel
setenv =
    PYTHONPATH=.
    DJANGO_SETTINGS_MODULE=test_deploy_settings
commands =
    django-admin check --deploy --fail-level WARNING
