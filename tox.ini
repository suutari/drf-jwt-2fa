[tox]
envlist =
    style
    uvlock
    py310-django22
    py{310,312}-django32
    py{310,312,314}-django{42,52}

[testenv]
no_default_groups = true
dependency_groups = dev
deps =
    django20: django~=2.0.0
    django22: django~=2.2.0
    django32: django~=3.2.0
    django42: django~=4.2.0
    django52: django~=5.2.0
    djangorestframework
setenv =
    PYTHONPATH=.
commands =
    pytest -ra -v --strict --doctest-modules \
        --cov-config={toxinidir}/.coveragerc --cov=drf_jwt_2fa \
        {posargs}

[testenv:style]
skip_install = True
basepython = python3.10
commands = flake8 --enable=T {posargs}

[testenv:uvlock]
basepython = python3.10
dependency_groups =
commands = uv lock --check
